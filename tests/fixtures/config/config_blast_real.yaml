output_root: tests/fixtures/outputs
job_id: test_job

manifest: tests/fixtures/manifests/valid_minimal.tsv

stages:
  qc_raw: false
  trimming: false
  qc_trimmed: false
  assembly: false
  annotation: false
  phylogeny: true
  reporting: false

tools:
  blast:
    mode: local
    database_source: fasta

    database_name: test_mito
    database_dir: tests/fixtures/blast/database
    reference_fasta: tests/fixtures/blast/reference_mitogenomes.fasta
    database_title: MitoPipeline BLAST integration database

    initialize_database: true
    overwrite_database: true
    parse_seqids: true

    threads: 4
    task: blastn
    evalue: 1.0e-5
    max_target_seqs: 50
    max_hsps: 1
    maximum_matches: 6

    perc_identity: null
    query_coverage: null
    word_size: null

    output_format: >-
      6 qseqid sseqid pident length mismatch gapopen
      qstart qend sstart send evalue bitscore qcovs
      staxids sscinames stitle