output_root: /home/fishl/mitogenome_project/outputs
manifest: ctrl/config/mitopipeline_production_manifest.tsv
input_directory: /home/fishl/mitogenome_project/all_species_raw
job_id: final_output
validate_input_files: true
stages:
  qc_raw: true
  trimming: true
  qc_trimmed: true
  assembly: true
  annotation: true
  visualization: true
  phylogeny: true
  reporting: true
  pdf_export: true
  sra_archival: true
  biosample_archival: false
  mitogenome_archival: false
  archival_validation: false
  table2asn_validation: false
assembly_assessment:
  complete_min_length: 14000
  complete_max_length: 22000
  minimum_fragment_length: 200
tools:
  fastp:
    threads: 8
    qualified_quality_phred: 20
    length_required: 50
    trim_front1: null
    trim_tail1: null
    trim_front2: null
    trim_tail2: null
    cut_window_size: 4
    cut_mean_quality: 20
    n_base_limit: 5
    unqualified_percent_limit: 40
    average_qual: null
    report_title: null
    adapter_sequence: null
    adapter_sequence_r2: null
    adapter_fasta: null
    detect_adapter_for_pe: true
    cut_front: false
    cut_tail: false
    cut_right: false
    disable_quality_filtering: false
    disable_length_filtering: false
    trim_poly_g: false
    disable_trim_poly_g: false
    trim_poly_x: false
  getorganelle:
    threads: 8
    database_type: animal_mt
    initialize_database: true
    max_rounds: null
    kmer: 21,33,55,85,115
    word_size: null
    pre_grouping: null
    max_reads: inf
    target_coverage: inf
    min_read_length: null
    max_read_length: null
    expected_max_size: null
    expected_min_size: null
    seed_file: null
    genes_file: null
    exclude_fasta: null
    prefix: null
    round_output_prefix: null
    blast_path: null
    bandage_path: null
    spades_path: null
    overwrite: true
    continue_run: false
    fast_mode: false
    disentangle_df: 5.0
    disentangle_time_limit: 1800
    reverse_lsc: false
    no_slim: false
    keep_temp_files: false
    verbose: false
  fastqc.raw:
    threads: 2
  fastqc.trimmed:
    threads: 2
  mitos2:
    conda_env: mito-annotation
    env_file: envs/annotation.yaml
    genetic_code: 2
    refdir: resources/mitos
    refseqver: refseq89m
    zenodo_record: '4284483'
    circular: true
    noplots: true
    best: false
    ncbicode: false
    zip_output: false
  visualization:
    dpi: 600
  blast:
    mode: local
    database_source: ncbi
    database_name: mitopipeline_mt_refs
    database_dir: resources/blast
    reference_fasta: resources/blast/reference_mitogenomes.fasta
    database_title: MitoPipeline mitochondrial reference database
    initialize_database: true
    overwrite_database: true
    parse_seqids: true
    threads: 8
    task: blastn
    evalue: 1.0e-05
    max_target_seqs: 50
    max_hsps: 1
    maximum_matches: 6
    perc_identity: null
    query_coverage: null
    word_size: null
    entrez_email: ecacayan@luc.edu
    entrez_api_key: null
    ncbi_query: mitochondrion[filter] AND refseq[filter] AND "complete genome"[Title]
    ncbi_max_records: 250
    ncbi_batch_size: 50
    output_format: 6 qseqid sseqid pident length mismatch gapopen qstart qend sstart
      send evalue bitscore qcovs staxids sscinames stitle
  alignment:
    executable: mafft
    threads: 8
    strategy: auto
  iqtree:
    executable: iqtree3
    threads: 16
    sequence_type: DNA
    model: MFP
    ultrafast_bootstrap: 1000
    sh_alrt: 1000
    random_seed: 12345
    render_dpi: 600
    midpoint_root_figure: true
  pdf_export:
    pandoc_bin: pandoc
    pdf_engine: typst
archival:
  sra:
    library_strategy: WGS
    library_source: GENOMIC
    library_selection: RANDOM
    library_layout: PAIRED
    platform: ILLUMINA
    instrument_model: null
    filetype: fastq
    title_template: '{sample_id} raw sequencing reads'
    design_description: null
  biosample:
    bioproject_accession: null
    isolation_source: null
    collection_date: null
    geo_loc_name: null
    lat_lon: null
    sample_type: environmental sample
    description_template: Biological sample for {sample_id}.
    mitogenome: null
    molecule_type: DNA
    genome_location: mitochondrion
    topology: circular
    assembly_method: GetOrganelle
    annotation_method: MITOS2
    file_mode: copy
  table2asn:
    executable: table2asn
    submission_template: /absolute/path/to/template.sbt
assembly_rescue:
  enabled: true
  trigger_statuses:
  - fragmented
  - partial
  complete_min_length: 14000
  complete_max_length: 22000
  minimum_score_improvement: 5.0
  maximum_gap_size: 5000
  reference_gap_n: 100
  terminal_overlap_min: 40
  terminal_overlap_max: 1000
  terminal_overlap_identity: 0.98
  run_read_mapping: true
  run_graph_resolution: true
  run_reference_scaffolding: true
  run_megahit: true
  getorganelle_profiles:
  - name: reduced_coverage
    kmer: 21,33,55,85,115
    target_coverage: 100
    max_rounds: 10
  - name: alternate_kmers
    kmer: 21,45,65,85,105
    target_coverage: 100
    max_rounds: 10
