output_root: null # Always have this!!!
# N.B. - Either one of manifest or input_directory must be null - if both are provided, source manifest will be used instead of construction of an input_directory-based manifest.
manifest: null # Keep null if you don't have a manifest, otherwise provide a path. 
input_directory: null # Keep null if you have a manifest, otherwise provide a path. 
job_id: null # Keep null if you want to start a new job, otherwise provide one if you want to pick up from a previously started job.
validate_input_files: true # Whether to validate input files.

stages: # Select which stages to run (true/false) - mostly for debugging purposes.
  qc_raw: true 
  trimming: true
  qc_trimmed: true
  assembly: true
  annotation: true
  phylogeny: true
  reporting: true
  pdf_export: true

tools:
  fastp: # Options for fastp.
    threads: 4 # Number of threads to use for fastp.
    qualified_quality_phred: 20 # Minimum quality score for a base to be considered "qualified".
    length_required: 50 # Minimum length of a read to be kept after trimming.
    trim_front1: null # Number of bases to trim from the front of the read.
    trim_tail1: null # Number of bases to trim from the tail of the read.
    trim_front2: null # Number of bases to trim from the front of the read (for paired-end reads).
    trim_tail2: null # Number of bases to trim from the tail of the read (for paired-end reads).
    cut_window_size: 4 # Size of the sliding window for quality cutting.
    cut_mean_quality: 20 # Mean quality score threshold for the sliding window.
    n_base_limit: 5 # Maximum number of N bases allowed in a read.
    unqualified_percent_limit: 40 # Maximum percentage of unqualified bases allowed in a read.
    average_qual: null # Minimum average quality score for a read to be kept.
    report_title: null # Title for the HTML report generated by fastp.
    adapter_sequence: null # Adapter sequence for read 1 (if known).
    adapter_sequence_r2: null # Adapter sequence for read 2 (if known, for paired-end reads).
    adapter_fasta: null # Path to a FASTA file containing adapter sequences (if known).
    detect_adapter_for_pe: true # Automatically detect adapter sequences for paired-end reads.
    cut_front: false # Cut bases from the front of the read.
    cut_tail: false # Cut bases from the tail of the read.
    cut_right: false # Cut bases from the right side of the read.
    disable_quality_filtering: false # Disable quality filtering of reads.
    disable_length_filtering: false # Disable length filtering of reads.
    trim_poly_g: false # Trim poly-G tails from reads (common in Illumina NovaSeq data).
    disable_trim_poly_g: false # Disable trimming of poly-G tails.
    trim_poly_x: false # Trim poly-X tails from reads (common in Illumina NovaSeq data).
  getorganelle: # Options for GetOrganelle.
    threads: 4 # Number of threads to use for GetOrganelle.
    database_type: animal_mt # Type of organelle database to use (e.g., animal_mt, plant_mt, etc.).
    initialize_database: true # Whether to initialize the organelle database.
    max_rounds: null # Maximum number of rounds for GetOrganelle assembly (null for default).
    kmer: null # K-mer size for GetOrganelle (null for default).
    word_size: null # Word size for GetOrganelle (null for default).
    pre_grouping: null # Pre-grouping option for GetOrganelle (null for default).
    max_reads: null # Maximum number of reads to use for GetOrganelle (null for default).
    target_coverage: null # Target coverage for GetOrganelle assembly (null for default).
    min_read_length: null # Minimum read length for GetOrganelle (null for default).
    max_read_length: null # Maximum read length for GetOrganelle (null for default).
    expected_max_size: null # Expected maximum size of the organelle genome (null for default).
    expected_min_size: null # Expected minimum size of the organelle genome (null for default).
    seed_file: null # Path to a seed file for GetOrganelle (null for default).
    genes_file: null # Path to a genes file for GetOrganelle (null for default).
    exclude_fasta: null # Path to a FASTA file of sequences to exclude from GetOrganelle (null for default).
    prefix: null # Prefix for output files generated by GetOrganelle (null for default).
    round_output_prefix: null # Prefix for output files generated in each round of GetOrganelle (null for default).
    blast_path: null # Path to the BLAST executable (null for default).
    bandage_path: null # Path to the Bandage executable (null for default).
    spades_path: null # Path to the SPAdes executable (null for default).
    overwrite: true # Whether to overwrite existing output files from GetOrganelle.
    continue_run: false # Whether to continue a previous GetOrganelle run (if applicable).
    fast_mode: false # Whether to run GetOrganelle in fast mode (less accurate but faster).
    disentangle: true # Whether to disentangle complex assembly graphs in GetOrganelle.
    reverse_lsc: false # Whether to reverse the LSC (long single copy) region in GetOrganelle.
    no_slim: false # Whether to disable the "slim" mode in GetOrganelle (which reduces memory usage).
    keep_temp_files: false # Whether to keep temporary files generated by GetOrganelle.
    verbose: false # Whether to enable verbose output from GetOrganelle.
  fastqc.raw: # Options for FastQC on raw reads.
    threads: 4 # Number of threads to use for FastQC.
  fastqc.trimmed: # Options for FastQC on trimmed reads.
    threads: 4 # Number of threads to use for FastQC.
  mitos2: # Options for mitos2.
    conda_env: mito-annotation # Name of the conda environment to use for mitos2.
    env_file: envs/annotation.yaml # Path to the conda environment YAML file for mitos2.
    genetic_code: 2 # Genetic code to use for mitos2 (e.g., 2 for vertebrate mitochondrial code).
    refdir: resources/mitos # Path to the reference directory for mitos2.
    refseqver: refseq89m # Reference sequence version for mitos2.
    zenodo_record: "4284483" # Zenodo record ID for mitos2 reference data.
    circular: true # Whether the mitochondrial genome is circular (true/false).
    noplots: false # Whether to disable plot generation in mitos2 (true/false).
    best: false # Whether to use the "best" mode in mitos2 (true/false).
    ncbicode: false # Whether to use NCBI code for mitos2 (true/false).
    zip_output: false # Whether to create zipped output for mitos2 (true/false).
  blast:
    mode: local # local | remote
    database_source: ncbi # ncbi | fasta; ignored in remote mode
    database_name: refseq_genomic # Name of the BLAST database
    database_dir: resources/blast # Path to the BLAST database directory
    reference_fasta: resources/blast/reference_mitogenomes.fasta # Path to the reference FASTA file
    database_title: MitoPipeline mitochondrial reference database # Title of the BLAST database
    initialize_database: true # Whether to initialize the BLAST database
    overwrite_database: false # Whether to overwrite the BLAST database
    parse_seqids: true # Whether to parse sequence IDs in the BLAST database
    threads: 4 # Number of threads to use for BLAST
    task: blastn # BLAST task to use
    evalue: 1.0e-5 # E-value threshold
    max_target_seqs: 50 # Maximum number of target sequences to retrieve
    max_hsps: 1 # Maximum number of HSPs to retrieve
    maximum_matches: 6 # Maximum number of matches to select
    perc_identity: null # Percentage identity threshold
    query_coverage: null # Query coverage threshold
    word_size: null # Word size for BLAST
    entrez_email: ecacayan@luc.edu # Email required for NCBI Entrez retrieval
    entrez_api_key: null # Optional NCBI API key
    output_format: >-
      6 qseqid sseqid pident length mismatch gapopen
      qstart qend sstart send evalue bitscore qcovs
      staxids sscinames stitle
  alignment: # Options for alignment
    executable: mafft # Name of executable
    threads: 4 # Number of threads to use for MAFFT
    strategy: auto # MAFFT alignment strategy
  iqtree: # Options for IQ-TREE
    executable: iqtree3 # Name of IQ-TREE executable
    threads: 4 # Number of threads to use for IQ-TREE
    sequence_type: DNA # Sequence type for IQ-TREE
    model: MFP # Model for IQ-TREE
    ultrafast_bootstrap: 1000 # Number of ultrafast bootstraps for IQ-TREE
    sh_alrt: 1000 # Number of SH ALRTs for IQ-TREE
    random_seed: 12345 # Random seed for IQ-TREE
    render_dpi: 600 # DPI for IQ-TREE render
    midpoint_root_figure: true # Whether to use midpoint root for IQ-TREE render
  pdf_export:
    pandoc_bin: pandoc # Pandoc executable
    pdf_engine: typst # PDF engine
